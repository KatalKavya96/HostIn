name: Deployment quality gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-application:
    name: Server, client, database, and browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hostin_test
          POSTGRES_USER: hostin
          POSTGRES_PASSWORD: hostin_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hostin -d hostin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://hostin:hostin_test_password@127.0.0.1:5432/hostin_test?schema=public
      JWT_SECRET: ci_only_jwt_secret_with_more_than_32_characters
      CLIENT_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:5001/api
      LOG_LEVEL: silent
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json
      - name: Install exact dependencies
        run: |
          npm ci
          npm ci --prefix server
          npm ci --prefix client
      - name: Install browser runtime
        run: npx playwright install --with-deps chromium
      - name: Run full production verification
        run: npm run verify:ci
      - name: Upload browser traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  verify-containers:
    name: Production container builds
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build production API image
        run: docker build --target production --tag hostin-server:test server
      - name: Build production web image
        run: docker build --target production --build-arg NEXT_PUBLIC_API_URL=http://server:5001/api --tag hostin-client:test client
