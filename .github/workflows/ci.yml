name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hostin_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hostin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hostin_test?schema=public
      JWT_SECRET: ci_jwt_secret_that_is_longer_than_32_characters
      CLIENT_ORIGIN: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:5001/api
      RUN_DATABASE_TESTS: "true"
      LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json
      - run: npm ci
      - run: npm ci --prefix server
      - run: npm ci --prefix client
      - run: npx prisma generate
        working-directory: server
      - run: npx prisma migrate deploy
        working-directory: server
      - run: npm run prisma:seed
        working-directory: server
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high
      - run: npm audit --prefix server --audit-level=high
      - run: npm audit --prefix client --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hostin_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hostin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hostin_test?schema=public
      JWT_SECRET: ci_jwt_secret_that_is_longer_than_32_characters
      CLIENT_ORIGIN: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:5001/api
      LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci && npm ci --prefix server && npm ci --prefix client
      - run: npx prisma generate && npx prisma migrate deploy && npm run prisma:seed
        working-directory: server
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build --target production -t hostin-server:test server
      - run: docker build --target production --build-arg NEXT_PUBLIC_API_URL=http://localhost:5001/api -t hostin-client:test client
