services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hostin}
      POSTGRES_USER: ${POSTGRES_USER:-hostin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hostin_local_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - hostin_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hostin} -d ${POSTGRES_DB:-hostin}"]
      interval: 5s
      timeout: 5s
      retries: 12

  server:
    build:
      context: ./server
      target: development
    environment:
      NODE_ENV: development
      PORT: 5001
      DATABASE_URL: ${DATABASE_URL:-postgresql://hostin:hostin_local_password@postgres:5432/hostin?schema=public}
      JWT_SECRET: ${JWT_SECRET:-local_development_secret_change_before_deploying}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000}
      SEED_DATABASE: ${SEED_DATABASE:-false}
    ports:
      - "5001:5001"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
      target: development
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001/api}
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    depends_on:
      server:
        condition: service_healthy

volumes:
  hostin_postgres:
  server_node_modules:
  client_node_modules:
